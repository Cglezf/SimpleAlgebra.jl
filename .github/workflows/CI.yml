name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/catthehacker/ubuntu:js-22.04
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', 'pre']
        os: [ubuntu-latest]
        arch: [x64]

    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
      - name: CI summary
        run: echo "✅ Tests passed for Julia ${{ matrix.version }}" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_STEP_SUMMARY: summary.txt
      - name: Show summary
        run: cat $GITHUB_STEP_SUMMARY

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      statuses: write

    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY || 'none' }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using SimpleAlgebra
          DocMeta.setdocmeta!(SimpleAlgebra, :DocTestSetup, :(using SimpleAlgebra); recursive=true)
          doctest(SimpleAlgebra)
      - name: Docs summary
        run: echo "📚 Documentation job completed for Julia 1.x" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_STEP_SUMMARY: summary.txt
      - name: Show summary
        run: cat $GITHUB_STEP_SUMMARY
